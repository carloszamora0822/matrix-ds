<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../tokens.css"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
  html,body{margin:0;padding:0;background:var(--bg-app);color:var(--text-strong);font-family:var(--font-sans)}
  .card{padding:22px;display:grid;gap:18px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .sw{display:grid;gap:6px}
  .chip{width:92px;height:56px;border-radius:12px;border:1px solid var(--line-soft);box-shadow:var(--shadow-inset)}
  .lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-body)}
  .name{font-size:13px;font-weight:700;color:var(--text-strong)}
</style></head><body><div class="card">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#ff6a2a"></div><div class="name">Ember</div><div class="hex">#ff6a2a</div></div>
    <div class="sw"><div class="chip" style="background:#ff4d00"></div><div class="name">Ember strong</div><div class="hex">#ff4d00</div></div>
    <div class="sw"><div class="chip" style="background:#5a78ff"></div><div class="name">Cobalt</div><div class="hex">#5a78ff</div></div>
    <div class="sw"><div class="chip" style="background:#c7d654"></div><div class="name">Citron</div><div class="hex">#c7d654</div></div>
    <div class="sw"><div class="chip" style="background:#d6b970"></div><div class="name">Sand</div><div class="hex">#d6b970</div></div>
    <div class="sw"><div class="chip" style="background:#d56156"></div><div class="name">Danger</div><div class="hex">#d56156</div></div>
    <div class="sw"><div class="chip" style="background:#6eb081"></div><div class="name">Success</div><div class="hex">#6eb081</div></div>
  </div>
  <div class="lbl">Signal accents — commit, focus, live, destructive, ok</div>
</div></body></html>
