<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../tokens.css"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
  html,body{margin:0;padding:0;background:var(--bg-app);color:var(--text-strong);font-family:var(--font-sans)}
  .card{padding:22px;display:grid;gap:10px}
  .row{display:grid;grid-template-columns:80px 1fr auto;gap:12px;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--line-soft)}
  .row:last-child{border:0}
  .lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted)}
  .sz{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
  .a{font-family:var(--font-display);font-weight:400;color:var(--text-strong);line-height:1}
</style></head><body><div class="card">
  <div class="row"><div class="lbl">Display</div><div class="a" style="font-size:72px">Aa</div><div class="sz">72 / 1.05</div></div>
  <div class="row"><div class="lbl">H1</div><div class="a" style="font-size:56px">Aa</div><div class="sz">56 / 1.05</div></div>
  <div class="row"><div class="lbl">H2</div><div class="a" style="font-size:40px">Aa</div><div class="sz">40 / 1.05</div></div>
  <div class="row"><div class="lbl">H3</div><div class="a" style="font-size:28px">Aa</div><div class="sz">28 / 1.2</div></div>
  <div class="row"><div class="lbl">H4</div><div class="a" style="font-family:var(--font-sans);font-weight:700;font-size:24px">Aa</div><div class="sz">24 / 1.2 · sans</div></div>
</div></body></html>
