<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../tokens.css"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
  html,body{margin:0;padding:0;background:var(--bg-app);color:var(--text-strong);font-family:var(--font-sans)}
  .card{padding:28px;display:flex;gap:24px;flex-wrap:wrap;align-items:end}
  .item{display:grid;gap:10px;text-align:center}
  .sh{width:110px;height:72px;border-radius:18px;background:var(--bg-shell);border:1px solid var(--line-soft)}
  .lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.05em;color:var(--text-muted)}
</style></head><body><div class="card">
  <div class="item"><div class="sh" style="box-shadow:inset 0 1px 0 rgba(255,255,255,0.03)"></div><div class="lbl">shadow-inset</div></div>
  <div class="item"><div class="sh" style="box-shadow:0 18px 40px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.03)"></div><div class="lbl">shadow-1</div></div>
  <div class="item"><div class="sh" style="box-shadow:0 24px 72px rgba(0,0,0,0.34)"></div><div class="lbl">shadow-2</div></div>
  <div class="item"><div class="sh" style="box-shadow:0 14px 28px rgba(255,106,42,0.35);background:linear-gradient(180deg,#ff8b55,#ff6a2a);border:0"></div><div class="lbl">ember glow</div></div>
</div></body></html>
