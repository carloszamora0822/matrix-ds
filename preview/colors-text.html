<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../tokens.css"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
  html,body{margin:0;padding:0;background:var(--bg-app);color:var(--text-strong);font-family:var(--font-sans)}
  .card{padding:22px;display:grid;gap:14px}
  .row{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:10px 14px;border-radius:12px;border:1px solid var(--line-soft);background:rgba(255,255,255,0.02)}
  .name{font-weight:700;font-size:13px;color:var(--text-strong)}
  .desc{font-size:12px;color:var(--text-muted)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-body)}
  .dot{width:14px;height:14px;border-radius:999px}
</style></head><body><div class="card">
  <div class="row"><div class="dot" style="background:#f7efd9"></div><div><div class="name">fg-1 / Strong</div><div class="desc">Headlines, primary UI text</div></div><div class="hex">#f7efd9</div></div>
  <div class="row"><div class="dot" style="background:#ddd3bb"></div><div><div class="name">fg-2 / Body</div><div class="desc">Body copy</div></div><div class="hex">#ddd3bb</div></div>
  <div class="row"><div class="dot" style="background:#a89f8d"></div><div><div class="name">fg-3 / Muted</div><div class="desc">Captions, helper, metadata</div></div><div class="hex">#a89f8d</div></div>
  <div class="row"><div class="dot" style="background:#241f16;border:1px solid var(--line-medium)"></div><div><div class="name">fg-on-paper</div><div class="desc">Text on paper surfaces</div></div><div class="hex">#241f16</div></div>
</div></body></html>
