<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../tokens.css"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
html,body{margin:0;padding:0;background:var(--bg-app);color:var(--text-strong);font-family:var(--font-sans)}
.card{padding:22px;display:grid;gap:10px}
.lk{display:flex;align-items:center;gap:14px}
.mark{width:48px;height:48px;border-radius:14px;background:linear-gradient(180deg,#1f241f,#131813);border:1px solid var(--line-medium);display:grid;place-items:center;position:relative;box-shadow:var(--shadow-inset)}
.mark::after{content:"";position:absolute;inset:6px;border-radius:8px;background:linear-gradient(135deg,var(--accent-ember) 0%,var(--accent-ember) 48%,transparent 48%,transparent 52%,#f7efd9 52%,#f7efd9 100%)}
.wm{font-family:var(--font-display);font-size:34px;font-weight:400;letter-spacing:-0.01em;line-height:1}
.tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-citron);margin-top:4px}
</style></head><body><div class="card">
<div class="lk">
  <div class="mark"></div>
  <div>
    <div class="wm">Matrix</div>
    <div class="tag">Design system · v0.1</div>
  </div>
</div>
</div></body></html>
