<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../tokens.css"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
html,body{margin:0;padding:0;background:var(--bg-app);color:var(--text-strong);font-family:var(--font-sans)}
.card{padding:22px;display:grid;gap:14px}
.msg{padding:14px 16px;border-radius:22px;line-height:1.55;font-size:14px;max-width:80%}
.user{justify-self:end;background:rgba(90,120,255,0.12);border:1px solid rgba(90,120,255,0.24);color:#dce4ff}
.ai{background:rgba(255,255,255,0.04);border:1px solid var(--line-medium);color:var(--text-strong)}
</style></head><body><div class="card">
<div class="msg user">Make a three-screen reopening deck for Saturday.</div>
<div class="msg ai">Drafted a tighter visual direction: bold opener, offer screen, location close. Warm palette throughout.</div>
</div></body></html>
