<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../tokens.css"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
html,body{margin:0;padding:0;background:var(--bg-app);color:var(--text-strong);font-family:var(--font-sans)}
.card{padding:22px;display:grid;gap:12px}
.field{display:grid;gap:6px}
label{font-size:13px;color:var(--text-body)}
input,textarea{width:100%;border:1px solid var(--line-medium);border-radius:var(--radius-control);background:rgba(255,255,255,0.03);color:var(--text-strong);font:inherit;padding:12px 14px;outline:none;box-sizing:border-box}
input:focus{border-color:rgba(90,120,255,0.6);box-shadow:0 0 0 4px rgba(90,120,255,0.12)}
.help{color:var(--text-muted);font-size:12px;font-family:var(--font-sans)}
</style></head><body><div class="card">
<div class="field"><label>Email address</label><input placeholder="you@studio.com"><span class="help">Magic link only. No password flow in v1.</span></div>
<div class="field"><label>Board name</label><input value="Studio board · Austin" style="border-color:rgba(90,120,255,0.6);box-shadow:0 0 0 4px rgba(90,120,255,0.12)"><span class="help">Focused state — cobalt ring</span></div>
</div></body></html>
