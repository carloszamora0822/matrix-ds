<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../tokens.css"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
html,body{margin:0;padding:0;background:var(--bg-app);color:var(--text-strong);font-family:var(--font-sans)}
.card{padding:22px;display:grid;gap:20px;max-width:560px}
.eye{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin:0 0 8px 0}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:999px;background:var(--accent-success);box-shadow:0 0 0 3px rgba(110,176,129,0.15);flex-shrink:0}
.chat-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:12px 14px;border-radius:16px;background:rgba(255,255,255,0.03);border:1px solid var(--line-soft)}
.selector{display:inline-flex;align-items:center;gap:10px;font-size:14px;color:var(--text-body);cursor:pointer;user-select:none}
.selector strong{color:var(--text-strong);font-weight:700}
.selector .sep{color:var(--text-muted);font-size:12px}
.selector .meta{color:var(--text-muted);font-size:12px;font-family:var(--font-mono);letter-spacing:.04em;text-transform:uppercase}
.selector .caret{width:10px;height:10px;border-right:1.5px solid var(--text-muted);border-bottom:1.5px solid var(--text-muted);transform:rotate(45deg) translateY(-2px);margin-left:4px}
.rundown{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;color:var(--text-muted);text-transform:uppercase}
.drop{position:relative;margin-top:8px}
.drop-panel{background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.015)),var(--bg-shell);border:1px solid var(--line-medium);border-radius:var(--radius-panel);padding:6px;box-shadow:var(--shadow-2);display:grid;gap:2px;max-width:340px}
.drop-item{padding:10px 12px;border-radius:12px;display:flex;align-items:center;gap:10px;color:var(--text-body);font-size:14px;cursor:pointer}
.drop-item:hover{background:rgba(255,255,255,0.04);color:var(--text-strong)}
.drop-item.active{background:rgba(255,255,255,0.06);color:var(--text-strong);font-weight:600}
.drop-item .meta{margin-left:auto;color:var(--text-muted);font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
</style></head><body><div class="card">
<div>
  <p class="eye">At rest — inline in the chat-head</p>
  <div class="chat-head">
    <button class="selector" type="button"><span class="live-dot"></span><strong>Studio</strong><span class="sep">·</span><span class="meta">Austin · CT</span><span class="caret"></span></button>
    <span class="rundown">Saturday 13:47</span>
  </div>
</div>
<div>
  <p class="eye">Open — dropdown panel</p>
  <div class="drop">
    <div class="drop-panel">
      <div class="drop-item active"><span class="live-dot"></span><strong>Studio</strong><span class="meta">Austin · CT</span></div>
      <div class="drop-item"><strong>Patio</strong><span class="meta">Austin · CT</span></div>
      <div class="drop-item"><strong>Kitchen</strong><span class="meta">Austin · CT</span></div>
      <div class="drop-item" style="color:var(--text-muted);font-size:13px">+ Pair a new board</div>
    </div>
  </div>
</div>
</div></body></html>
