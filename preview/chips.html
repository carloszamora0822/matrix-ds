<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../tokens.css"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
html,body{margin:0;padding:0;background:var(--bg-app);color:var(--text-strong);font-family:var(--font-sans)}
.card{padding:22px;display:grid;gap:20px}
.chip{border-radius:999px;padding:8px 12px;font-size:13px;font-weight:500;border:1px solid var(--line-medium);background:rgba(255,255,255,0.03);color:var(--text-body);display:inline-flex;align-items:center;gap:6px}
.chip.sugg{padding:5px 9px;font-size:12px;color:var(--text-muted);background:rgba(255,255,255,0.02);cursor:pointer}
.chip.sugg:hover{color:var(--text-body);background:rgba(255,255,255,0.05)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.eye{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin:0 0 6px 0}
</style></head><body><div class="card">
<div>
  <p class="eye">Suggestion chips</p>
  <div class="row">
    <span class="chip sugg">close early next Tuesday</span>
    <span class="chip sugg">plan next week</span>
    <span class="chip sugg">copy this day to next Sat</span>
  </div>
</div>
<div>
  <p class="eye">Metadata chips</p>
  <div class="row">
    <span class="chip">America/Chicago</span>
    <span class="chip">Studio · Austin</span>
    <span class="chip">Vestaboard Console</span>
  </div>
</div>
</div></body></html>
