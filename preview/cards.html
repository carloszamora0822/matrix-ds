<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../tokens.css"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
html,body{margin:0;padding:0;background:var(--bg-app);color:var(--text-strong);font-family:var(--font-sans)}
.wrap{padding:20px;display:grid;gap:12px;grid-template-columns:1fr 1fr}
.card{padding:18px;border-radius:22px;border:1px solid var(--line-soft);background:linear-gradient(180deg,rgba(255,255,255,0.015),rgba(255,255,255,0)),var(--bg-shell);box-shadow:0 18px 40px rgba(0,0,0,0.22),inset 0 1px 0 rgba(255,255,255,0.03)}
.paper{background:linear-gradient(180deg,#f2ead7,#e5dbc1);color:#241f16;border-color:rgba(25,31,26,0.1)}
h4{margin:0 0 6px;font-family:var(--font-display);font-weight:400;font-size:22px}
p{margin:0;font-size:13px;color:var(--text-muted);line-height:1.5}
.paper p{color:#655b48}
.eye{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-citron);margin-bottom:6px}
.paper .eye{color:#b24a14}
</style></head><body><div class="wrap">
<div class="card"><div class="eye">Dark card</div><h4>Studio board</h4><p>The default shell surface. Calm, layered, stage-lit for artifacts.</p></div>
<div class="card paper"><div class="eye">Paper card</div><h4>Sign in to run your boards.</h4><p>Warm paper breaks the shell for moments of intent.</p></div>
</div></body></html>
