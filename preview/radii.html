<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../tokens.css"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
  html,body{margin:0;padding:0;background:var(--bg-app);color:var(--text-strong);font-family:var(--font-sans)}
  .card{padding:22px;display:grid;gap:14px}
  .row{display:flex;gap:16px;flex-wrap:wrap;align-items:end}
  .item{display:grid;gap:6px;text-align:center}
  .sh{width:90px;height:64px;background:var(--bg-shell);border:1px solid var(--line-soft)}
  .lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.05em;color:var(--text-muted)}
</style></head><body><div class="card">
  <div class="row">
    <div class="item"><div class="sh" style="border-radius:16px"></div><div class="lbl">control · 16</div></div>
    <div class="item"><div class="sh" style="border-radius:22px"></div><div class="lbl">panel · 22</div></div>
    <div class="item"><div class="sh" style="border-radius:28px"></div><div class="lbl">card · 28</div></div>
    <div class="item"><div class="sh" style="border-radius:36px;height:72px;width:110px"></div><div class="lbl">hero · 36</div></div>
    <div class="item"><div class="sh" style="border-radius:999px;width:110px;height:40px"></div><div class="lbl">pill · 999</div></div>
  </div>
</div></body></html>
