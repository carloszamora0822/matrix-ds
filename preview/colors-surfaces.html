<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/><style>:root {
  color-scheme: dark;

  --bg-app: #0e110e;
  --bg-shell: #131813;
  --bg-panel: #1b211b;
  --bg-panel-2: #202821;
  --bg-panel-3: #252f27;
  --bg-paper: #f2ead7;
  --bg-paper-2: #e5dbc1;

  --text-strong: #f7efd9;
  --text-body: #ddd3bb;
  --text-muted: #a89f8d;
  --text-dark: #241f16;
  --text-dark-muted: #655b48;

  --line-soft: rgba(244, 234, 211, 0.08);
  --line-medium: rgba(244, 234, 211, 0.16);
  --line-strong: rgba(25, 31, 26, 0.12);

  --accent-ember: #ff6a2a;
  --accent-ember-strong: #ff4d00;
  --accent-cobalt: #5a78ff;
  --accent-citron: #c7d654;
  --accent-sand: #d6b970;
  --accent-danger: #d56156;
  --accent-success: #6eb081;

  --shadow-1: 0 18px 40px rgba(0, 0, 0, 0.22);
  --shadow-2: 0 24px 72px rgba(0, 0, 0, 0.34);
  --shadow-inset: inset 0 1px 0 rgba(255, 255, 255, 0.03);

  --radius-card: 28px;
  --radius-panel: 22px;
  --radius-control: 16px;
  --radius-pill: 999px;

  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-7: 32px;
  --space-8: 40px;
  --space-9: 56px;
  --space-10: 72px;

  --font-display:
    "Instrument Serif", "Iowan Old Style", "Palatino Linotype", "Book Antiqua",
    Georgia, serif;
  --font-sans:
    "Manrope", "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --font-mono:
    "IBM Plex Mono", "SFMono-Regular", "SF Mono", Consolas, "Liberation Mono",
    monospace;

  --text-xs: 12px;
  --text-sm: 14px;
  --text-md: 16px;
  --text-lg: 18px;
  --text-xl: 24px;
  --text-2xl: 34px;
  --text-3xl: 52px;

  --leading-tight: 1.05;
  --leading-snug: 1.2;
  --leading-normal: 1.5;

  --ease-standard: cubic-bezier(0.22, 1, 0.36, 1);
  --speed-fast: 140ms;
  --speed-base: 220ms;
}
</style><style>
  html,body{margin:0;padding:0;background:var(--bg-app);color:var(--text-strong);font-family:var(--font-sans)}
  .card{padding:22px;display:grid;gap:18px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .sw{display:grid;gap:6px}
  .chip{width:108px;height:58px;border-radius:12px;border:1px solid var(--line-soft);box-shadow:var(--shadow-inset)}
  .lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-body)}
  .name{font-size:13px;font-weight:700;color:var(--text-strong)}
</style></head><body><div class="card">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0e110e"></div><div class="name">App</div><div class="hex">#0e110e</div></div>
    <div class="sw"><div class="chip" style="background:#131813"></div><div class="name">Shell</div><div class="hex">#131813</div></div>
    <div class="sw"><div class="chip" style="background:#1b211b"></div><div class="name">Panel</div><div class="hex">#1b211b</div></div>
    <div class="sw"><div class="chip" style="background:#202821"></div><div class="name">Panel 2</div><div class="hex">#202821</div></div>
    <div class="sw"><div class="chip" style="background:#252f27"></div><div class="name">Panel 3</div><div class="hex">#252f27</div></div>
    <div class="sw"><div class="chip" style="background:#f2ead7"></div><div class="name" style="color:#241f16;background:#f2ead7;padding:2px 6px;border-radius:6px;display:inline-block">Paper</div><div class="hex">#f2ead7</div></div>
    <div class="sw"><div class="chip" style="background:#e5dbc1"></div><div class="name" style="color:#241f16;background:#e5dbc1;padding:2px 6px;border-radius:6px;display:inline-block">Paper 2</div><div class="hex">#e5dbc1</div></div>
  </div>
  <div class="lbl">Surface tokens — dark shell + warm paper inserts</div>
</div></body></html>
