<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../tokens.css"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
html,body{margin:0;padding:0;background:var(--bg-app);color:var(--text-strong);font-family:var(--font-sans)}
.card{padding:22px;display:flex;gap:12px;flex-wrap:wrap}
button{position:relative;isolation:isolate;overflow:hidden;appearance:none;border:1px solid transparent;border-radius:var(--radius-control);padding:12px 18px;min-height:44px;font:inherit;font-weight:800;letter-spacing:-0.01em;cursor:pointer}
.primary{color:#180f0a;background:linear-gradient(180deg,#ff8b55,#ff6a2a);box-shadow:0 14px 28px rgba(255,106,42,0.2)}
.secondary{color:var(--text-strong);background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));border-color:var(--line-medium);box-shadow:inset 0 1px 0 rgba(255,255,255,0.03)}
.ghost{color:var(--text-body);background:transparent;border-color:rgba(255,255,255,0.02)}
.danger{color:#fff0ed;background:linear-gradient(180deg,rgba(221,114,101,0.2),rgba(213,97,86,0.12));border-color:rgba(213,97,86,0.34)}
</style></head><body><div class="card">
<button class="primary">Pair a board</button>
<button class="secondary">Preview draft</button>
<button class="ghost">Dismiss</button>
<button class="danger">Archive</button>
</div></body></html>
